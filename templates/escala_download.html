<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ schedule.department }} - {{ church_name }}</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            width: 1200px;
            height: 630px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
        }

        .content {
            width: 100%;
            padding: 30px 50px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            flex: 1;
        }

        thead th {
            background: #002e5d;
            color: white;
            padding: 14px 20px;
            font-size: 1.2em;
            font-weight: 700;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        thead th:first-child { border-radius: 10px 0 0 0; }
        thead th:last-child  { border-radius: 0 10px 0 0; }

        tbody tr:nth-child(even) { background: #e8edf3; }
        tbody tr:nth-child(odd)  { background: #ffffff; }

        tbody td {
            padding: 12px 20px;
            font-size: 1.2em;
            border-bottom: 1px solid #d0d8e4;
            vertical-align: middle;
        }

        .day-col {
            font-weight: 700;
            color: #002e5d;
            width: 160px;
        }

        .date-col {
            color: #4a5568;
            font-weight: 500;
            width: 160px;
        }

        .vol-col {
            font-weight: 600;
            color: #1a202c;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            color: #6c757d;
            font-size: 1.4em;
        }
    </style>
</head>
<body>
    <div class="content">
        {% if schedule_data and schedule_data.days %}
        <table>
            <thead>
                <tr>
                    <th>Dia</th>
                    <th>Data</th>
                    <th>Voluntário(s)</th>
                </tr>
            </thead>
            <tbody>
                {% for day in schedule_data.days %}
                <tr>
                    <td class="day-col">{{ day.name }}</td>
                    <td class="date-col">{{ day.date }}</td>
                    <td class="vol-col">
                        {% if day.volunteers %}
                            {{ day.volunteers | join(', ') }}
                        {% else %}
                            <span style="color:#adb5bd;">—</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="no-data">Nenhuma informação de escala disponível</div>
        {% endif %}
    </div>
</body>
</html>
